<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Search System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div id="searchScreen" class="screen active">
            <h1>Application Search</h1>
            <div class="search-box">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search by Name, Application ID, SSN, Product, or Agent ID..."
                    autocomplete="off"
                >
                <button id="searchBtn" onclick="performSearch()">Search</button>
            </div>
        </div>

        <div id="agentQueueScreen" class="screen">
            <button class="back-btn" onclick="goBackToSearch()">← Back to Search</button>
            <h1>Work Queue</h1>
            <div id="searchResults" class="results-container"></div>
            <div id="noResults" class="no-results" style="display: none;">
                No applications found. Please try a different search term.
            </div>
        </div>

        <div id="workItemScreen" class="screen">
            <button class="back-btn" onclick="goBackToQueue()">← Back to Work Queue</button>
            <h1>Work Item</h1>
            <div id="workItemContent" class="work-item-content"></div>
            <div class="work-item-notes">
                <label for="caseNotesInput">Notes</label>
                <textarea id="caseNotesInput" rows="6" placeholder="Enter case notes..."></textarea>
            </div>
            <div class="work-item-actions">
                <button id="saveNotesBtn" onclick="saveWorkItemNotes()">Save</button>
                <button id="okBtn" onclick="okAndReturn()">OK</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
