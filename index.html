<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Queue</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-shell">
        <div class="container">
            <section id="queueScreen" class="screen active">
                <div class="page-header">
                    <div>
                        <p class="eyebrow">Application Records</p>
                        <h1>Work Queue</h1>
                    </div>
                </div>

                <div class="queue-card">
                    <div class="queue-grid queue-grid-header">
                        <div>Application ID</div>
                        <div>Last Name</div>
                        <div>First Name</div>
                        <div>Status</div>
                        <div>Product Type</div>
                        <div>Agent ID</div>
                    </div>
                    <div id="queueList" class="queue-list"></div>
                    <div id="noRecords" class="empty-state" hidden>No application records available.</div>
                </div>
            </section>

            <section id="recordScreen" class="screen">
                <button class="back-btn" type="button" onclick="goBackToQueue()">Back to Work Queue</button>

                <div class="page-header record-header">
                    <div>
                        <p class="eyebrow">Selected Record</p>
                        <h1 id="recordTitle">Application</h1>
                    </div>
                    <div id="recordMeta" class="record-meta"></div>
                </div>

                <div class="tabs" role="tablist" aria-label="Record tabs">
                    <button class="tab-btn active" type="button" data-tab="details" onclick="selectTab('details')">Details</button>
                    <button class="tab-btn" type="button" data-tab="notes" onclick="selectTab('notes')">Notes</button>
                    <button class="tab-btn" type="button" data-tab="credit" onclick="selectTab('credit')">Credit Notes</button>
                    <button class="tab-btn" type="button" data-tab="underwriter" onclick="selectTab('underwriter')">Underwriter Notes</button>
                </div>

                <div class="tab-panels">
                    <section id="tab-details" class="tab-panel active">
                        <div id="detailsContent" class="details-card"></div>
                    </section>

                    <section id="tab-notes" class="tab-panel">
                        <div class="note-card">
                            <h2>Process Notes</h2>
                            <p id="processNotesContent" class="note-text"></p>
                        </div>
                    </section>

                    <section id="tab-credit" class="tab-panel">
                        <div class="note-card">
                            <h2>Credit Notes</h2>
                            <p id="creditNotesContent" class="note-text"></p>
                        </div>
                    </section>

                    <section id="tab-underwriter" class="tab-panel">
                        <div class="note-card">
                            <h2>Underwriter Notes</h2>
                            <p id="underwriterNotesContent" class="note-text"></p>
                        </div>
                    </section>
                </div>
            </section>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
