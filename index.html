<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Search System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Search Screen -->
        <div id="searchScreen" class="screen active">
            <h1>Application Search</h1>
            <div class="search-box">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search by Name, Application ID, SSN, Product, or Agent ID..."
                    autocomplete="off"
                >
                <button id="searchBtn" onclick="performSearch()">Search</button>
            </div>
        </div>

        <!-- Agent Queue Screen -->
        <div id="agentQueueScreen" class="screen">
            <button class="back-btn" onclick="goBackToSearch()">← Back to Search</button>
            <h1>Agent Queue</h1>
            <div id="searchResults" class="results-container line-items"></div>
            <div id="noResults" class="no-results" style="display: none;">
                No applications found. Please try a different search term.
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
